[pytest]
pythonpath = .src
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

env =
    TEST_ENV=CONTAINER
    ; TEST_ENV=REAL
    APP_CONFIG__DB__DATABASE=test-db-weather
    APP_CONFIG__ENV=TEST
    APP_CONFIG__MAX_REQUESTS_PER_MINUTE=20
    APP_CONFIG__REDIS__RETRY_DB=0



python_files = *_test.py *_tests.py test_*.py